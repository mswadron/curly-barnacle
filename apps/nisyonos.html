<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>נסיונות המדבר · Nisyonos in the Midbar</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --maroon:#5a1421; --maroon-deep:#3d0d18; --maroon-ink:#2a0810;
  --ink:#16110f; --paper:#ffffff; --paper-soft:#fafaf9; --paper-tint:#fbf7f6;
  --bg:#f7ecec; --rule:#e6e6e6; --dotted:#d8d2cf; --mute:#6e6663; --mute-soft:#9a9290;
  --gold:#a8792a; --beyond:#3d6b6b; --death:#8a1c1c;
  --display:'Bricolage Grotesque',system-ui,sans-serif;
  --body:'Crimson Pro',Georgia,serif;
  --hebrew:'Frank Ruhl Libre',serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--hebrew);line-height:1.6;}
.app{max-width:1000px;margin:0 auto;padding:0 18px 80px;}

/* header */
.hd{padding:26px 4px 6px;text-align:center;border-bottom:1px solid var(--maroon);margin-bottom:20px;}
.hd-eyebrow{font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:0.18em;color:var(--maroon);direction:ltr;}
.hd-title{font-family:var(--hebrew);font-weight:900;font-size:clamp(30px,7vw,46px);margin:6px 0 8px;color:var(--maroon-ink);letter-spacing:0.5px;}
.hd-sub{font-size:clamp(15px,3.4vw,18px);color:var(--ink);max-width:64ch;margin:0 auto 18px;opacity:.86;}
.tabs{display:flex;justify-content:center;gap:0;flex-wrap:wrap;}
.tab{font-family:var(--hebrew);font-weight:700;font-size:16px;background:transparent;color:var(--maroon-ink);border:1.5px solid var(--maroon);padding:9px 20px;cursor:pointer;transition:all .15s;}
.tab:first-child{border-radius:0 999px 999px 0;}
.tab:last-child{border-radius:999px 0 0 999px;}
.tab:not(:last-child){border-left:none;}
.tab.active{background:var(--maroon);color:#fff;}
.tab:hover:not(.active){background:var(--paper-tint);}

/* shared quote */
.quote{margin:5px 0;font-size:17px;line-height:1.7;}
.qlabel{display:inline-block;font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:.08em;color:#fff;background:var(--maroon);padding:1px 7px;border-radius:3px;margin-left:7px;vertical-align:middle;direction:ltr;}
.qtext{color:var(--ink);}
.src{font-family:var(--display);font-weight:700;font-size:10.5px;letter-spacing:.04em;color:var(--maroon);text-decoration:none;border-bottom:1px dotted var(--maroon);margin-right:7px;white-space:nowrap;direction:rtl;}
.src:hover{background:var(--paper-tint);}

/* ---- cards ---- */
.cards{display:flex;flex-direction:column;gap:10px;}
.card{background:var(--paper);border:1px solid var(--rule);border-right:3px solid var(--maroon);}
.card.beyond{border-right-color:var(--beyond);}
.card-head{width:100%;display:flex;align-items:center;gap:12px;background:none;border:none;cursor:pointer;padding:13px 15px;text-align:right;font-family:var(--hebrew);}
.card-num{font-family:var(--display);font-weight:800;font-size:13px;color:#fff;background:var(--maroon);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;}
.card.beyond .card-num{background:var(--beyond);}
.card-titles{display:flex;flex-direction:column;flex:1;min-width:0;}
.card-he{font-weight:700;font-size:21px;color:var(--maroon-ink);line-height:1.3;}
.card-place{font-size:13px;color:var(--mute);}
.card-tag{font-family:var(--hebrew);font-weight:700;font-size:12px;color:var(--maroon);background:var(--paper-tint);border:1px solid var(--dotted);padding:3px 9px;border-radius:999px;flex:none;}
.card-tag.tag-beyond{color:var(--beyond);}
.card-chev{color:var(--mute-soft);font-size:13px;flex:none;}
.card-body{padding:4px 16px 16px;border-top:1px dotted var(--dotted);}
.card-note{font-size:14px;color:var(--maroon-deep);background:var(--paper-tint);border-right:2px solid var(--gold);padding:7px 11px;margin:11px 0;border-radius:0 4px 4px 0;}
.facet{margin:12px 0;}
.facet-label{font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--mute);border-bottom:1px solid var(--rule);padding-bottom:3px;margin-bottom:5px;direction:rtl;}
.facet.deaths .facet-label{color:var(--death);border-color:#e8d2d2;}
.facet.deaths.none .facet-label{color:var(--mute-soft);}
.facet.deaths .qtext{font-weight:500;}

/* ---- timeline ---- */
.timeline{position:relative;padding:6px 0;}
.tl-divider{font-family:var(--hebrew);font-weight:700;font-size:14px;color:var(--beyond);text-align:center;margin:18px 0 10px;padding:6px;border-top:1px dashed var(--beyond);border-bottom:1px dashed var(--beyond);}
.tl-row{display:flex;gap:14px;padding:6px 0;position:relative;}
.tl-row::before{content:"";position:absolute;top:0;bottom:0;right:13px;width:2px;background:var(--dotted);}
.tl-row:first-child::before{top:14px;}
.tl-marker{flex:none;width:28px;display:flex;justify-content:center;z-index:1;}
.tl-marker span{font-family:var(--display);font-weight:800;font-size:12px;color:#fff;background:var(--maroon);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid var(--bg);}
.tl-row.beyond .tl-marker span{background:var(--beyond);}
.tl-row.decree .tl-marker span{background:var(--gold);box-shadow:0 0 0 3px rgba(168,121,42,.25);}
.tl-content{flex:1;background:var(--paper);border:1px solid var(--rule);padding:10px 14px;margin-bottom:8px;}
.tl-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:5px;}
.tl-he{font-weight:700;font-size:19px;color:var(--maroon-ink);}
.tl-place{font-size:12px;color:var(--mute);}
.tl-tag{font-family:var(--hebrew);font-weight:700;font-size:11px;color:var(--maroon);margin-right:auto;}
.tl-tag.tag-beyond{color:var(--beyond);}
.tl-quote{font-size:16px;color:var(--ink);margin:3px 0 6px;opacity:.92;}
.tl-deaths{font-size:14px;color:var(--ink);}
.tl-deaths strong{color:var(--death);font-weight:700;}
.tl-toll{color:var(--death);font-weight:700;}

/* ---- big table ---- */
.table-wrap{overflow:auto;max-height:82vh;border:1px solid var(--rule);background:var(--paper);-webkit-overflow-scrolling:touch;}
.bigtable{border-collapse:collapse;width:100%;min-width:1180px;font-family:var(--hebrew);}
.bigtable th,.bigtable td{border:1px solid var(--rule);padding:8px 10px;text-align:right;vertical-align:top;font-size:15px;line-height:1.62;}
.bigtable thead th{background:var(--maroon);color:#fff;font-weight:700;font-size:12.5px;position:sticky;top:0;z-index:3;white-space:nowrap;}
.bigtable th:first-child,.bigtable td:first-child{position:sticky;right:0;z-index:2;border-left:2px solid var(--maroon);}
.bigtable thead th:first-child{z-index:5;}
.bigtable td:first-child{background:var(--paper);}
.bigtable tbody tr:nth-child(even) td:first-child{background:#f4ecec;}
.bigtable tr.row-beyond td:first-child{background:#e6f0f0;}
.bigtable tr.row-beyond:nth-child(even) td:first-child{background:#dcebeb;}
.tc-rownum{display:inline-block;font-family:var(--display);font-weight:800;font-size:11px;color:#fff;background:var(--maroon);border-radius:50%;width:20px;height:20px;line-height:20px;text-align:center;margin-bottom:4px;}
.bigtable tr.row-beyond .tc-rownum{background:var(--beyond);}
.bigtable tbody tr:nth-child(even) td{background:#fbfafa;}
.bigtable tr.row-beyond td{background:#eff5f5;}
.bigtable tr.row-beyond:nth-child(even) td{background:#e8f1f1;}
.bigtable td.qcol{min-width:215px;}
.tc-num{font-family:var(--display);font-weight:800;color:var(--maroon);text-align:center;width:30px;}
.tc-name{min-width:148px;}
.tc-name .tc-he{display:block;font-weight:700;font-size:16px;color:var(--maroon-ink);line-height:1.35;}
.tc-name .tc-place{display:block;font-size:12px;color:var(--mute);margin-top:1px;}
.tc-name .tc-tag{display:inline-block;font-size:11px;font-weight:700;color:var(--maroon);margin-top:4px;}
.tc-name .tc-tag.tag-beyond{color:var(--beyond);}
.tc-q{margin-bottom:7px;}
.tc-q:last-child{margin-bottom:0;}
.tc-lab{display:inline-block;font-family:var(--display);font-weight:700;font-size:9px;letter-spacing:.05em;color:#fff;background:var(--maroon);padding:1px 6px;border-radius:3px;margin-left:5px;vertical-align:middle;direction:ltr;}
.tc-none{color:var(--mute-soft);}
.tc-death{min-width:150px;color:var(--death);font-weight:500;}
.tc-death.none{color:var(--mute);font-weight:400;}
.tc-in{text-align:center;width:62px;}
.in-yes{color:#1c7a3d;font-weight:800;font-size:17px;}
.in-no{color:var(--beyond);font-weight:700;font-size:12px;white-space:nowrap;}
@media(max-width:560px){ .bigtable th,.bigtable td{font-size:14px;} }

/* ---- the ten ---- */
.ten-intro{font-size:17px;line-height:1.8;background:var(--paper);border:1px solid var(--rule);border-top:3px solid var(--gold);padding:14px 16px;margin:0 0 16px;}
.matrix-wrap{overflow-x:auto;border:1px solid var(--rule);background:var(--paper);}
.matrix{border-collapse:collapse;width:100%;min-width:560px;font-family:var(--hebrew);}
.matrix th,.matrix td{border:1px solid var(--rule);padding:7px 6px;text-align:center;font-size:14px;}
.matrix thead th{background:var(--maroon);color:#fff;font-weight:700;font-size:13px;position:sticky;top:0;}
.matrix thead th a{color:#fff;text-decoration:none;border-bottom:1px dotted rgba(255,255,255,.5);}
.matrix .ep-col{text-align:right;background:var(--paper-tint);}
.matrix td.ep-col{min-width:190px;}
.ep-he{display:block;font-weight:700;font-size:14.5px;color:var(--maroon-ink);line-height:1.4;}
.ep-ref{display:block;font-family:var(--display);font-weight:600;font-size:10px;color:var(--mute);margin-top:1px;direction:rtl;}
.matrix tbody tr:nth-child(even) td{background:#fbfafa;}
.matrix tbody tr:nth-child(even) td.ep-col{background:var(--paper-tint);}
td.clickable{cursor:pointer;}
td.clickable:hover{background:#f3e3e3 !important;}
.cell{font-weight:800;font-size:16px;}
.cell.yes{color:#1c7a3d;}
.cell.no{color:var(--mute-soft);}
.cell.dis{color:var(--gold);}
.cell.dis sup{font-size:9px;font-weight:700;}
.legend{display:flex;gap:18px;flex-wrap:wrap;font-size:13px;color:var(--mute);margin:10px 2px 0;}
.legend .cell{font-size:14px;margin-left:3px;}
.fn-box{background:#fff8ef;border:1px solid var(--gold);border-radius:5px;padding:10px 13px;margin:12px 0;font-size:15px;line-height:1.65;cursor:pointer;}
.fn-x{font-family:var(--display);font-weight:700;font-size:10px;color:var(--maroon);float:left;}
.disputes-h{font-family:var(--hebrew);font-weight:900;font-size:22px;color:var(--maroon-ink);margin:26px 0 10px;border-bottom:1px solid var(--maroon);padding-bottom:4px;}
.disputes{display:flex;flex-direction:column;gap:9px;}
.dispute{background:var(--paper);border:1px solid var(--rule);border-right:3px solid var(--gold);padding:11px 14px;font-size:16px;line-height:1.7;}
.d-title{font-weight:700;font-size:17px;color:var(--maroon-ink);margin-bottom:3px;}
.enums{display:flex;flex-direction:column;gap:9px;}
.enum{background:var(--paper);border:1px solid var(--rule);padding:11px 14px;}
.enum-auth{display:block;font-weight:700;font-size:16px;color:var(--maroon);text-decoration:none;border-bottom:1px dotted var(--maroon);margin-bottom:5px;width:fit-content;}
.enum-he{font-size:17px;line-height:1.7;color:var(--ink);}
.enum-tail{font-size:14px;color:var(--mute);margin-top:4px;}

/* ---- table zoom ---- */
.zoombar{display:flex;align-items:center;gap:8px;margin:0 2px 12px;flex-wrap:wrap;}
.zoombar-lab{font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);margin-left:2px;}
.zoombar button{font-family:var(--hebrew);font-weight:700;font-size:18px;line-height:1;min-width:36px;height:32px;background:var(--paper);color:var(--maroon-ink);border:1.5px solid var(--maroon);cursor:pointer;border-radius:7px;transition:background .15s;}
.zoombar button:hover{background:var(--paper-tint);}
.zoombar .zoom-reset{font-size:14px;padding:0 14px;}
.zoom-val{font-family:var(--display);font-weight:700;font-size:13px;color:var(--maroon-ink);min-width:52px;text-align:center;}

/* footer */
.ft{text-align:center;font-family:var(--hebrew);font-weight:500;font-size:13px;color:var(--mute-soft);margin-top:34px;padding-top:14px;border-top:1px solid var(--rule);}

@media(max-width:560px){
  .card-tag,.tl-tag{font-size:10px;}
  .card-he{font-size:18px;}
  .quote{font-size:16px;}
}
</style>
</head>
