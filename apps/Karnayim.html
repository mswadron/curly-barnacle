<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karnayim · A Primer for Chullin 59b</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    :root{
      --maroon:       #5a1421;
      --maroon-deep:  #3d0d18;
      --maroon-ink:   #2a0810;
      --ink:          #16110f;
      --paper:        #ffffff;
      --paper-soft:   #fafaf9;
      --paper-tint:   #fbf7f6;
      --bg:           #f7ecec;
      --rule:         #e6e6e6;
      --dotted:       #d8d2cf;
      --mute:         #6e6663;
      --mute-soft:    #9a9290;
      --p-mita:       #5a1421;
      --p-karet:      #4a2a5a;
      --p-rabbinic:   #3a4a6b;
      --p-structural: #6e6663;
      --display: 'Bricolage Grotesque', system-ui, sans-serif;
      --body:    'Crimson Pro', Georgia, serif;
      --hebrew:  'Frank Ruhl Libre', serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--body); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { color: var(--maroon); text-decoration: none; border-bottom: 1px solid currentColor; }
    a:hover { background: var(--paper-tint); }
    code { font-family: ui-monospace, 'Cascadia Code', Menlo, monospace; font-size: 0.85em; background: rgba(90,20,33,0.06); padding: 1px 5px; border-radius: 0; color: var(--maroon); }

    .shell-header { position: sticky; top: 0; z-index: 30; background: var(--bg); border-bottom: 1px solid var(--maroon); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .brand { font-family: var(--display); font-weight: 800; font-size: 15px; letter-spacing: -0.01em; color: var(--maroon-ink); }
    .brand .heb { font-family: var(--hebrew); font-weight: 700; margin-left: 6px; color: var(--maroon); }
    .navs { display: flex; gap: 18px; font-family: var(--display); font-weight: 600; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); }
    .navs span.active { color: var(--maroon); }
    .header-right { display: flex; align-items: center; gap: 18px; }
    .crumb { font-family: var(--display); font-weight: 600; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mute); }
    .lang-toggle { display: flex; border: 1px solid var(--maroon); }
    .lang-toggle button { font-family: var(--display); font-weight: 700; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; padding: 5px 9px; background: transparent; color: var(--maroon); border: 0; border-right: 1px solid var(--maroon); cursor: pointer; }
    .lang-toggle button:last-child { border-right: 0; }
    .lang-toggle button.active { background: var(--maroon); color: var(--paper); }
    .lang-toggle button:disabled { opacity: 0.4; cursor: not-allowed; }

    .shell-body { display: grid; grid-template-columns: 1fr 380px; gap: 0; min-height: calc(100vh - 56px); }
    @media (max-width: 980px) {
      .shell-body { grid-template-columns: 1fr; }
      .rail { border-left: 0 !important; border-top: 1px solid var(--rule); }
      .rail-sticky { position: static !important; max-height: none !important; }
    }
    .main { padding: 32px 36px 80px; max-width: 100%; overflow: hidden; }
    .rail { background: var(--paper-soft); border-left: 1px solid var(--rule); padding: 0; }
    .rail-sticky { position: sticky; top: 55px; max-height: calc(100vh - 55px); overflow-y: auto; padding: 28px 24px; }

    .section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 18px; flex-wrap: wrap; }
    .section-head-left { display: flex; flex-direction: column; gap: 4px; }
    .eyebrow { font-family: var(--display); font-weight: 700; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--maroon); }
    .section-title { font-family: var(--display); font-weight: 700; font-size: 20px; letter-spacing: -0.01em; color: var(--ink); }

    .segmented { display: flex; border: 1px solid var(--maroon); }
    .segmented button { font-family: var(--display); font-weight: 600; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; padding: 7px 12px; background: transparent; color: var(--maroon); border: 0; border-right: 1px solid var(--maroon); cursor: pointer; }
    .segmented button:last-child { border-right: 0; }
    .segmented button.active { background: var(--maroon); color: var(--paper); }

    .headline { margin-bottom: 36px; border-bottom: 1px solid var(--rule); padding-bottom: 24px; }
    .headline h1 { font-family: var(--display); font-weight: 800; font-size: 34px; line-height: 1.05; letter-spacing: -0.01em; color: var(--maroon-ink); margin: 6px 0 8px; }
    .headline .he { font-family: var(--hebrew); font-weight: 700; direction: rtl; font-size: 28px; color: var(--maroon); display: block; margin-bottom: 4px; }
    .headline .dek { font-family: var(--body); font-size: 16px; color: var(--mute); max-width: 60ch; margin-top: 8px; }

    .prose { font-family: var(--body); font-size: 15px; line-height: 1.65; max-width: 64ch; }
    .prose p { margin: 0 0 14px; }
    .prose .he-inline { font-family: var(--hebrew); font-weight: 700; direction: rtl; unicode-bidi: isolate; display: inline; color: var(--ink); }
    .translit { font-family: var(--body); font-style: italic; font-size: 14px; color: #5b4a44; }

    .signs { display: flex; flex-direction: column; gap: 0; margin-top: 8px; }
    .sign-card { background: var(--paper); border: 1px solid var(--rule); border-top: 3px solid var(--maroon); padding: 14px 16px; margin-bottom: -1px; cursor: pointer; transition: background 60ms linear; }
    .sign-card:hover { background: var(--paper-tint); }
    .sign-card.active { outline: 2px solid var(--maroon); outline-offset: -2px; }
    .sign-row { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
    .sign-he { font-family: var(--hebrew); font-weight: 700; direction: rtl; font-size: 24px; color: var(--maroon-ink); line-height: 1.1; }
    .sign-translit { font-family: var(--body); font-style: italic; font-size: 15px; color: var(--mute); }
    .sign-gloss { font-family: var(--body); font-size: 14px; color: var(--ink); }
    .sign-num { font-family: var(--display); font-weight: 700; font-size: 11px; letter-spacing: 0.18em; color: var(--mute-soft); min-width: 24px; }

    .chip { display: inline-block; font-family: var(--display); font-weight: 700; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; padding: 3px 7px; color: var(--paper); background: var(--maroon); border-radius: 0; }
    .chip.outline { background: transparent; color: var(--maroon); border: 1px solid var(--maroon); }

    .rail-section { padding-bottom: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--rule); }
    .rail-section:last-child { border-bottom: 0; }
    .rail-label { font-family: var(--display); font-weight: 700; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--maroon); margin-bottom: 10px; }
    .pasuk { background: var(--paper); border-left: 3px solid var(--maroon); padding: 12px 14px; }
    .pasuk-he { font-family: var(--hebrew); direction: rtl; font-weight: 500; font-size: 19px; line-height: 1.7; color: var(--ink); }
    .pasuk-translit { font-family: var(--body); font-style: italic; font-size: 13px; color: #5b4a44; margin-top: 6px; }
    .pasuk-en { font-family: var(--body); font-size: 14px; color: var(--ink); margin-top: 6px; }
    .pasuk-ref { font-family: var(--display); font-weight: 700; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); margin-top: 8px; }
    .commentary { font-family: var(--body); font-size: 14px; line-height: 1.6; }
    .commentary p { margin: 0 0 8px; }
    .commentary .heb-block { font-family: var(--hebrew); direction: rtl; font-size: 17px; line-height: 1.65; color: var(--ink); margin: 6px 0; }
    .commentary .it { font-style: italic; color: #5b4a44; }

    .plate { background: var(--paper); border: 1px solid var(--rule); display: flex; flex-direction: column; }
    .plate-img-wrap { position: relative; background: var(--paper-tint); border-bottom: 1px solid var(--rule); width: 100%; aspect-ratio: 4 / 3; overflow: hidden; }
    .plate-img-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
    .plate-img-wrap.contain img { object-fit: contain; padding: 12px; background: var(--paper); }
    .plate-img-fallback { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; padding: 20px; color: var(--maroon); font-family: var(--body); font-size: 13px; text-align: center; }
    .plate-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; }
    .plate-title { font-family: var(--display); font-weight: 700; font-size: 14px; color: var(--ink); letter-spacing: -0.005em; }
    .plate-he { font-family: var(--hebrew); direction: rtl; font-weight: 700; color: var(--maroon); margin-right: 6px; }
    .plate-caption { font-family: var(--body); font-size: 14px; line-height: 1.55; color: var(--ink); margin-top: 6px; }
    .plate-credit { font-family: var(--display); font-weight: 600; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); margin-top: auto; padding-top: 8px; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
    @media (min-width: 1180px) { .grid-2 { grid-template-columns: repeat(3, 1fr); } }

    .case-table { width: 100%; border-collapse: collapse; background: var(--paper); border: 1px solid var(--rule); font-family: var(--body); font-size: 14px; }
    .case-table th { font-family: var(--display); font-weight: 700; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; text-align: left; padding: 10px 12px; background: var(--paper); border-bottom: 1px solid var(--maroon); color: var(--maroon-ink); }
    .case-table td { padding: 10px 12px; border-top: 1px solid var(--rule); vertical-align: top; }
    .case-table .heb { font-family: var(--hebrew); direction: rtl; unicode-bidi: isolate; font-weight: 700; font-size: 17px; color: var(--maroon-ink); }

    .flow { background: var(--paper); border: 1px solid var(--rule); padding: 18px 20px; }
    .flow-branch { display: grid; grid-template-columns: 24px 1fr; gap: 16px; padding: 14px 0; border-bottom: 1px dotted var(--dotted); }
    .flow-branch:last-child { border-bottom: 0; }
    .flow-num { font-family: var(--display); font-weight: 700; font-size: 14px; color: var(--mute-soft); }
    .flow-head { font-family: var(--display); font-weight: 700; font-size: 13px; color: var(--ink); letter-spacing: -0.005em; margin-bottom: 6px; }
    .flow-heb { font-family: var(--hebrew); direction: rtl; font-weight: 500; font-size: 19px; line-height: 1.7; color: var(--ink); margin: 4px 0; }
    .flow-en { font-family: var(--body); font-size: 14px; color: var(--ink); line-height: 1.55; }
    .flow-ref { font-family: var(--display); font-weight: 700; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); margin-top: 6px; }

    .reading-item { background: var(--paper); border: 1px solid var(--rule); border-left: 3px solid var(--maroon); padding: 10px 14px; margin-bottom: 8px; }
    .reading-item a { border-bottom: 0; }
    .reading-title { font-family: var(--display); font-weight: 700; font-size: 14px; color: var(--ink); }
    .reading-he { font-family: var(--hebrew); font-weight: 700; direction: rtl; display: inline-block; margin-right: 8px; color: var(--maroon); }
    .reading-note { font-family: var(--body); font-size: 13px; color: var(--mute); margin-top: 2px; }

    .foot { margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--rule); font-family: var(--body); font-size: 13px; color: var(--mute); }
    .foot .eyebrow { margin-bottom: 8px; }
  </style>
</head>
