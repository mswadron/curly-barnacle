<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chagavim · Kosher Locusts of Chullin 65</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

<style>
:root{
  --maroon:#5a1421; --maroon-deep:#3d0d18; --maroon-ink:#2a0810;
  --ink:#16110f; --paper:#ffffff; --paper-soft:#fafaf9; --paper-tint:#fbf7f6;
  --bg:#f7ecec; --rule:#e6e6e6; --dotted:#d8d2cf; --mute:#6e6663; --mute-soft:#9a9290;
  --p-arbeh:#5a1421; --p-solam:#4a2a5a; --p-hargol:#3a4a6b; --p-hagav:#6e6663; --p-excl:#8a3324;
  --display:'Bricolage Grotesque',system-ui,sans-serif;
  --body:'Crimson Pro',Georgia,serif;
  --hebrew:'Frank Ruhl Libre',serif;
  --header-h:55px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
.he{font-family:var(--hebrew);direction:rtl;}
.heb-inline{font-family:var(--hebrew);font-weight:700;}
.translit{font-style:italic;color:#5b4a44;font-family:var(--body);}
a{color:var(--maroon);text-decoration:none;}
a:hover{text-decoration:underline;}

/* eyebrow */
.eyebrow{font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--maroon);}
.eyebrow.mute{color:var(--mute);}

/* ------------------------------------------------------------------ HEADER */
header.shell{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--maroon);}
.shell-inner{display:flex;align-items:center;gap:22px;padding:8px 20px;min-height:var(--header-h);}
.brand{display:flex;flex-direction:column;line-height:1.05;}
.brand .name{font-family:var(--hebrew);font-weight:900;font-size:23px;color:var(--maroon-ink);direction:rtl;}
.brand .sub{font-family:var(--display);font-weight:700;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--mute);margin-top:2px;}
nav.sections{display:flex;gap:2px;flex-wrap:wrap;flex:1;}
nav.sections button{font-family:var(--display);font-weight:600;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  background:transparent;border:0;border-bottom:2px solid transparent;color:var(--mute);padding:6px 9px;cursor:pointer;}
nav.sections button .he{font-size:14px;font-weight:700;}
nav.sections button:hover{color:var(--ink);}
nav.sections button.on{color:var(--maroon);border-bottom-color:var(--maroon);}
.head-right{display:flex;align-items:center;gap:14px;}
.crumb{font-family:var(--display);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute-soft);}
.lang-toggle{display:flex;border:1px solid var(--maroon);}
.lang-toggle button{font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:.1em;background:var(--paper);
  border:0;border-right:1px solid var(--maroon);color:var(--maroon);padding:5px 9px;cursor:pointer;}
.lang-toggle button:last-child{border-right:0;}
.lang-toggle button.on{background:var(--maroon);color:var(--paper);}

/* ------------------------------------------------------------------- BODY */
.layout{display:grid;grid-template-columns:1fr 380px;align-items:start;max-width:1320px;margin:0 auto;}
main.canvas{padding:22px 24px 80px;min-width:0;}
aside.rail{position:sticky;top:var(--header-h);height:calc(100vh - var(--header-h));overflow-y:auto;
  background:var(--paper-soft);border-left:1px solid var(--rule);padding:18px 18px 60px;}

/* section header */
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;border-bottom:1px solid var(--maroon);padding-bottom:10px;margin-bottom:20px;}
.sec-head .titles{display:flex;flex-direction:column;gap:4px;}
.sec-head h1{font-family:var(--display);font-weight:800;font-size:25px;letter-spacing:-.01em;margin:0;color:var(--ink);}
.sec-head h1 .he{font-family:var(--hebrew);font-weight:900;}
.seg{display:flex;border:1px solid var(--maroon);flex-shrink:0;}
.seg button{font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  background:var(--paper);border:0;border-right:1px solid var(--maroon);color:var(--maroon);padding:7px 12px;cursor:pointer;white-space:nowrap;}
.seg button:last-child{border-right:0;}
.seg button.on{background:var(--maroon);color:var(--paper);}

.intro{font-size:15.5px;color:var(--ink);max-width:64ch;margin:-4px 0 22px;}
.intro .he{font-size:18px;}

/* card grid */
.grid{display:grid;gap:14px;}
.grid.kinds{grid-template-columns:repeat(2,1fr);}
.grid.species{grid-template-columns:repeat(2,1fr);}
@media(max-width:640px){.grid.kinds,.grid.species{grid-template-columns:1fr;}}

.card{background:var(--paper);border:1px solid var(--rule);padding:0;cursor:pointer;position:relative;display:flex;flex-direction:column;}
.card .topbar{height:3px;width:100%;}
.card .body{padding:13px 15px 15px;}
.card:hover{background:var(--paper-tint);}
.card.on{outline:2px solid var(--maroon);outline-offset:-2px;}
.card .torah{font-family:var(--hebrew);direction:rtl;font-weight:900;font-size:30px;color:var(--maroon-ink);line-height:1;}
.card .torah-tr{font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);margin-top:5px;}

/* side-by-side vernacular names */
.names2{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--rule);margin-top:12px;}
.names2 .col{padding:8px 10px;}
.names2 .col:first-child{border-right:1px solid var(--rule);}
.names2 .src{font-family:var(--display);font-weight:700;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--maroon);}
.names2 .nm{font-family:var(--hebrew);direction:rtl;font-weight:700;font-size:19px;color:var(--ink);margin-top:3px;}
.names2 .nm-tr{font-style:italic;font-size:12px;color:#5b4a44;margin-top:1px;}
.swap-note{font-size:11px;color:var(--mute);margin-top:7px;font-style:italic;}

.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:11px;}
.chip{font-family:var(--display);font-weight:700;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 7px;border:1px solid var(--dotted);color:var(--mute);background:#fff;}
.chip.feat{background:var(--maroon);color:#fff;border-color:var(--maroon);}
.thumb{width:100%;height:118px;object-fit:cover;display:block;background:#eee;border-bottom:1px solid var(--rule);}

/* badges */
.badge{font-family:var(--display);font-weight:700;font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:2px;}
.badge.direct{background:#1f3d23;color:#eef3ee;}
.badge.lexicon{background:#3a4a6b;color:#eef0f5;}
.badge.descript{background:#6e6663;color:#f3f0ee;}

/* ---------------------------------------------------------------- SIGNS / CHECKER */
.signbox{background:var(--paper);border:1px solid var(--rule);padding:16px 18px;margin-bottom:18px;}
.signrow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px dotted var(--dotted);}
.signrow:last-child{border-bottom:0;}
.toggle{flex-shrink:0;width:44px;height:24px;border:1px solid var(--maroon);background:var(--paper);position:relative;cursor:pointer;transition:background .15s;}
.toggle .knob{position:absolute;top:1px;left:1px;width:20px;height:20px;background:var(--mute-soft);transition:left .15s,background .15s;}
.toggle.on{background:var(--maroon);}
.toggle.on .knob{left:21px;background:#fff;}
.signrow .lab{flex:1;}
.signrow .lab .he{font-family:var(--hebrew);direction:rtl;font-weight:700;font-size:18px;}
.signrow .lab .en{font-size:13px;color:var(--mute);}
.signrow.derived .lab .he{color:var(--maroon-ink);}

.verdict{border:1px solid var(--maroon);padding:16px 18px;margin-top:4px;background:var(--paper);}
.verdict .status{font-family:var(--display);font-weight:800;font-size:22px;letter-spacing:-.01em;}
.verdict.kosher .status{color:#1f3d23;}
.verdict.not .status{color:var(--p-excl);}
.verdict .why{font-size:14px;color:var(--ink);margin-top:6px;}
.verdict .profile{font-size:13px;color:var(--mute);margin-top:8px;font-style:italic;}

/* derivation chain */
.chain{display:flex;flex-direction:column;gap:0;}
.step{background:var(--paper);border:1px solid var(--rule);border-left:3px solid var(--maroon);padding:13px 16px;}
.step .stage{font-family:var(--display);font-weight:700;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--maroon);}
.step .he{font-family:var(--hebrew);direction:rtl;font-size:20px;font-weight:500;line-height:1.7;margin:5px 0;}
.step .en{font-size:13.5px;color:var(--ink);}
.step .ref{font-family:var(--display);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute-soft);margin-top:7px;}
.connector{align-self:flex-start;margin:0 0 0 26px;width:1px;height:16px;background:var(--maroon);}

/* plates / gallery */
.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media(max-width:640px){.gallery{grid-template-columns:1fr;}}
.plate{background:var(--paper);border:1px solid var(--rule);}
.plate img{width:100%;display:block;background:#eee;border-bottom:1px solid var(--rule);}
.plate .cap{padding:11px 13px;}
.plate .cap .he{font-family:var(--hebrew);direction:rtl;font-weight:700;font-size:16px;}
.plate .cap .en{font-size:13px;color:var(--ink);margin-top:4px;}
.plate .cap .credit{font-family:var(--display);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--mute-soft);margin-top:8px;}
.plate .cap .honesty{font-size:11px;font-style:italic;color:var(--mute);margin-top:5px;}

/* ----------------------------------------------------------------- RAIL */
.rail-section{padding:14px 0;border-bottom:1px solid var(--rule);}
.rail-section:last-child{border-bottom:0;}
.rail-section h3{font-family:var(--display);font-weight:700;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--maroon);margin:0 0 9px;}
.pasuk{background:var(--paper);border-left:3px solid var(--maroon);padding:11px 13px;}
.pasuk .he{font-family:var(--hebrew);direction:rtl;font-weight:500;font-size:20px;line-height:1.75;}
.pasuk .tr{font-style:italic;font-size:13px;color:#5b4a44;margin-top:8px;}
.pasuk .en{font-size:13.5px;margin-top:8px;}
.pasuk .ref{display:flex;align-items:center;gap:8px;justify-content:space-between;margin-top:9px;}
.pasuk .ref .r{font-family:var(--display);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);}
.rail-img{width:100%;display:block;border:1px solid var(--rule);margin-top:4px;}
.rail-cap{font-size:11.5px;color:var(--mute);font-style:italic;margin-top:6px;}
.etym{padding:10px 0;border-bottom:1px dotted var(--dotted);}
.etym:last-child{border-bottom:0;}
.etym .lang{font-family:var(--display);font-weight:700;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--maroon);}
.etym .forms{font-family:var(--hebrew);direction:rtl;font-weight:700;font-size:16px;margin:2px 0;}
.etym .forms.latin{font-family:var(--body);direction:ltr;font-style:italic;font-weight:600;}
.etym .gloss{font-size:13px;color:var(--ink);}
.rail-empty{font-size:13px;color:var(--mute-soft);font-style:italic;padding:20px 0;}

.disc{font-size:11px;color:var(--mute-soft);border-top:1px solid var(--rule);margin-top:30px;padding-top:14px;line-height:1.5;}
.disc b{color:var(--mute);font-weight:700;}

/* ------------------------------------------------------------ MOBILE / PHONE */
@media(max-width:760px){
  .layout{grid-template-columns:1fr;max-width:100%;}
  main.canvas{padding:18px 16px 64px;}
  aside.rail{position:static;height:auto;overflow:visible;border-left:0;border-top:1px solid var(--rule);}
  .shell-inner{flex-wrap:wrap;gap:8px 14px;padding:8px 14px;}
  nav.sections{order:3;width:100%;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;}
  .head-right{margin-left:auto;}
  .sec-head{flex-wrap:wrap;}
  .seg{flex-wrap:wrap;}
}
@media(max-width:420px){
  .names2{grid-template-columns:1fr;}
  .names2 .col:first-child{border-right:0;border-bottom:1px solid var(--rule);}
  .sec-head h1{font-size:21px;}
}
</style>
</head>
